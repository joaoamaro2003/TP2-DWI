<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="PokéGuess - Jogo de adivinhar Pokémon" />
    <meta name="author" content="[O teu nome]" />
    <title>PokéGuess</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- ECRÃ INICIAL -->
    <main id="ecra-inicio" class="ecra ativo">
      <header>
        <h1 class="logo"><span class="amarelo">Poké</span>Guess</h1>
        <p class="subtitulo">Consegues adivinhar o Pokémon?</p>
      </header>

      <section class="painel">
        <p class="etiqueta">Modo de jogo</p>
        <div class="grelha-modos">
          <button class="btn-modo ativo" data-modo="silhueta">
            👤 Silhueta
          </button>
          <button class="btn-modo" data-modo="estatisticas">
            📊 Estatísticas
          </button>
          <button class="btn-modo" data-modo="tipogen">
            🔮 Tipo + Geração
          </button>
          <button class="btn-modo" data-modo="evolucao">🔄 Evolução</button>
        </div>

        <p class="etiqueta">Dificuldade</p>
        <div class="linha-dificuldade">
          <button class="btn-dif ativo" data-dif="facil">
            Fácil · Gen I · 60s
          </button>
          <button class="btn-dif" data-dif="medio">
            Médio · Gen I-II · 45s
          </button>
          <button class="btn-dif" data-dif="dificil">
            Difícil · Todas · 25s
          </button>
        </div>

        <button id="btn-iniciar" class="btn-primario">Iniciar Partida</button>
        <button id="btn-historico" class="btn-secundario">📜 Histórico</button>
      </section>
    </main>

    <!-- ECRÃ DE JOGO -->
    <main id="ecra-jogo" class="ecra">
      <header class="hud">
        <div>
          <small>Modo</small>
          <span id="hud-modo">—</span>
        </div>
        <div class="hud-centro">
          <div id="zona-vidas" class="vidas">
            <span class="vida">❤️</span>
            <span class="vida">❤️</span>
            <span class="vida">❤️</span>
          </div>
          <div id="caixa-tempo" class="caixa-tempo">
            <span id="tempo-texto">60</span>s
          </div>
          <div>
            <small>Pontos</small>
            <span id="hud-pontos" class="amarelo">0</span>
          </div>
        </div>
        <div>
          <small>Streak</small>
          <span id="hud-streak" class="verde">🔥 0</span>
        </div>
      </header>

      <section class="area-jogo">
        <p class="label-ronda">Ronda <span id="num-ronda">1</span></p>

        <div id="display-pokemon" class="display-pokemon"></div>

        <div id="area-pistas" class="area-pistas"></div>

        <div id="area-resposta">
          <!-- Input texto -->
          <div id="zona-input" class="zona-input" hidden>
            <label for="input-resposta" class="sr-only">Nome do Pokémon</label>
            <input
              type="text"
              id="input-resposta"
              placeholder="Nome do Pokémon…"
              autocomplete="off"
              spellcheck="false"
            />
            <button id="btn-adivinhar">Adivinhar</button>
          </div>

          <!-- Múltipla escolha -->
          <div id="zona-opcoes" class="zona-opcoes" hidden></div>
        </div>

        <button id="btn-pista" class="btn-pista">💡 Pista <kbd>H</kbd></button>

        <p id="feedback" class="feedback"></p>
      </section>
    </main>

    <!-- ECRÃ FIM DE JOGO -->
    <main id="ecra-fim" class="ecra">
      <div class="cartao-fim">
        <h2>Jogo Terminado!</h2>
        <div class="stats-fim">
          <div class="stat">
            <span>Pontuação</span>
            <strong id="fim-pontos">0</strong>
          </div>
          <div class="stat">
            <span>Acertos</span>
            <strong id="fim-acertos">0</strong>
          </div>
          <div class="stat">
            <span>Rondas</span>
            <strong id="fim-rondas">0</strong>
          </div>
          <div class="stat">
            <span>Maior Streak</span>
            <strong id="fim-streak">0</strong>
          </div>
        </div>
        <button id="btn-jogar-novamente" class="btn-primario">
          Jogar Novamente
        </button>
        <button id="btn-menu" class="btn-secundario">Menu Principal</button>
      </div>
    </main>

    <!-- ECRÃ HISTÓRICO -->
    <main id="ecra-historico" class="ecra">
      <div class="cabecalho-historico">
        <button id="btn-voltar" class="btn-voltar">← Voltar</button>
        <h2>Histórico</h2>
        <button id="btn-exportar" class="btn-secundario pequeno">⬇ CSV</button>
      </div>
      <div id="lista-historico"></div>
      <p id="historico-vazio" hidden>Ainda não jogaste nenhuma partida.</p>
    </main>

    <!-- LOADING -->
    <div id="loading" class="loading" hidden>
      <div class="pokeball">
        <div class="pb-cima"></div>
        <div class="pb-meio"></div>
        <div class="pb-baixo"></div>
      </div>
      <p>A carregar…</p>
    </div>

    <!-- TOAST -->
    <div id="toast" class="toast"></div>

    <!-- ATALHOS -->
    <aside class="atalhos">
      <kbd>Enter</kbd> Submeter &nbsp;|&nbsp; <kbd>H</kbd> Pista
    </aside>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/estado.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/temporizador.js"></script>
    <script src="js/modos/silhueta.js"></script>
    <script src="js/modos/estatisticas.js"></script>
    <script src="js/modos/tipogen.js"></script>
    <script src="js/modos/evolucao.js"></script>
    <script src="js/historico.js"></script>
    <script src="js/jogo.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
